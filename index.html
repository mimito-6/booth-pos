<!DOCTYPE html>
<html lang="zh-Hant" data-theme="warm">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>OpenBooth · 擺攤收銀台</title>
    <meta name="description" content="開源、離線優先、可自訂的同人/手作擺攤收銀台 POS。資料只存在你的裝置。" />
    <meta name="theme-color" content="#c46b43" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OpenBooth" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- prototype design themes (scoped to [data-theme]; inert unless active) -->
    <link rel="stylesheet" href="css/theme-press.css" />
    <link rel="stylesheet" href="css/theme-cotton.css" />
    <link rel="stylesheet" href="css/theme-market.css" />
  </head>
  <body>
    <div id="app"></div>
    <noscript>
      <div style="padding: 40px; text-align: center; font-family: sans-serif">
        OpenBooth 需要啟用 JavaScript 才能運作。<br />
        Please enable JavaScript.
      </div>
    </noscript>

    <!-- core -->
    <script src="js/i18n.js"></script>
    <script src="js/util.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/components.js"></script>
    <script src="js/store.js"></script>
    <script src="js/pricing.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/router.js"></script>
    <!-- views -->
    <script src="js/views/home.js"></script>
    <script src="js/views/front.js"></script>
    <script src="js/views/stock.js"></script>
    <script src="js/views/event.js"></script>
    <script src="js/views/pickup.js"></script>
    <script src="js/views/pay.js"></script>
    <script src="js/views/record.js"></script>
    <script src="js/views/settings.js"></script>
    <!-- boot -->
    <script src="js/app.js"></script>

    <!-- receipt-engine integration: render + thermal-print / share at checkout (optional add-on) -->
    <script src="js/openbooth-receipt-bridge.global.js"></script>
    <script src="js/openbooth-receipt.js"></script>
  </body>
</html>
